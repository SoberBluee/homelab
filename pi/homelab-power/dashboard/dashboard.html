<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Homelab Power Dashboard</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
            /* Light olive + warm neutrals */
            --olive-50: #f4f5ef;
            --olive-100: #e3e6d8;
            --olive-200: #cdd2bf;
            --olive-300: #aeb59a;
            --olive-400: #8f9778;
            --olive-500: #737a5f;
            --olive-800: #3d4234;
            --olive-900: #2a2e24;

            --bg: #1a1c16;
            --bg-elevated: #22251d;
            --surface: #262922;
            --surface-highlight: #2e3228;
            --border: rgba(205, 210, 191, 0.14);
            --border-strong: rgba(174, 181, 154, 0.28);
            --text: var(--olive-50);
            --muted: var(--olive-300);
            --accent-line: var(--olive-400);

            --on: #7cb87a;
            --on-deep: #5a9a58;
            --on-glow: rgba(124, 184, 122, 0.35);
            --off: #c98a8a;
            --off-deep: #a86a6a;
            --off-glow: rgba(201, 138, 138, 0.3);

            --radius-card: 20px;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.25);
            --shadow-lift: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SF Pro Text", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: 1rem;
            line-height: 1.55;
            color: var(--text);
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 100% 80% at 50% -30%, rgba(174, 181, 154, 0.18), transparent 55%),
                radial-gradient(ellipse 70% 50% at 100% 100%, rgba(115, 122, 95, 0.12), transparent 50%),
                radial-gradient(ellipse 60% 45% at 0% 80%, rgba(205, 210, 191, 0.06), transparent 45%),
                repeating-linear-gradient(
                    -12deg,
                    transparent,
                    transparent 48px,
                    rgba(205, 210, 191, 0.02) 48px,
                    rgba(205, 210, 191, 0.02) 49px
                );
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1.25rem, 4vw, 2.5rem);
        }

        h1 {
            margin: 0 0 0.35rem;
            font-size: clamp(1.35rem, 3.5vw, 1.65rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--olive-100);
        }

        h1::after {
            content: "";
            display: block;
            width: 2.75rem;
            height: 3px;
            margin-top: 0.65rem;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-line), transparent);
        }

        p {
            margin: 1rem 0 1.75rem;
            color: var(--muted);
            max-width: 34ch;
            font-size: 0.95rem;
        }

        main {
            position: relative;
            width: min(100%, 38rem);
            padding: clamp(1.75rem, 5vw, 2.25rem);
            background:
                linear-gradient(145deg, var(--surface-highlight) 0%, var(--surface) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-lift), var(--shadow-soft);
            overflow: hidden;
        }

        main::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--olive-300) 15%,
                var(--olive-200) 50%,
                var(--olive-300) 85%,
                transparent
            );
            opacity: 0.65;
        }

        main::after {
            content: "";
            position: absolute;
            top: -40%;
            right: -30%;
            width: 55%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(205, 210, 191, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        main > * {
            position: relative;
            z-index: 1;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(1.25rem, 5vw, 2rem);
            width: 100%;
            min-height: clamp(14rem, 38vh, 20rem);
            margin-top: 0.25rem;
            padding: clamp(1.75rem, 5vw, 2.75rem) clamp(1.5rem, 4vw, 2.5rem);
            border-radius: 16px;
            border: 1px solid var(--border-strong);
            background: linear-gradient(
                180deg,
                rgba(205, 210, 191, 0.06) 0%,
                rgba(42, 46, 36, 0.45) 100%
            );
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        button {
            flex: 0 0 auto;
            width: clamp(6.5rem, 28vw, 7.75rem);
            height: clamp(6.5rem, 28vw, 7.75rem);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            padding: 0.75rem;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1.25;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #141812;
            transition:
                transform 0.15s ease,
                box-shadow 0.2s ease,
                border-color 0.2s ease,
                filter 0.15s ease;
        }

        button:first-of-type {
            background: linear-gradient(160deg, #9ed49c 0%, var(--on) 45%, var(--on-deep) 100%);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 8px 28px var(--on-glow);
        }

        button:first-of-type:hover {
            filter: brightness(1.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.15) inset,
                0 12px 36px var(--on-glow);
            transform: translateY(-2px);
        }

        button:first-of-type:active {
            transform: translateY(0) scale(0.97);
        }

        button:last-of-type {
            background: linear-gradient(160deg, #e4b4b4 0%, var(--off) 45%, var(--off-deep) 100%);
            color: #1f1010;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 8px 28px var(--off-glow);
        }

        button:last-of-type:hover {
            filter: brightness(1.05);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 12px 36px var(--off-glow);
            transform: translateY(-2px);
        }

        button:last-of-type:active {
            transform: translateY(0) scale(0.97);
        }

    </style>
</head>
<body>
    <main>
        <h1>Homelab Power Dashboard</h1>
        <p>This is a dashboard for the homelab power system.</p>

        <form>
            <button type="submit" formaction="/turn-on">Turn on</button>
            <button type="submit" formaction="/shutdown">Turn off</button>
        </form>
    </main>
</body>

</html>
