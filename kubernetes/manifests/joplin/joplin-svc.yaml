apiVersion: v1
kind: Service
metadata:
  name: joplin-headless-service
  namespace: joplin-namespace
spec:
  clusterIP: None
  selector:
    app: joplin-postgres
  ports:
    - name: joplin-postgres
      port: 5432

---

apiVersion: v1
kind: Service
metadata:
  name: joplin-service
  namespace: joplin-namespace
spec:
  type: ClusterIP
  selector:
    app: joplin-postgres
  ports:
    - name: joplin-postgres
      port: 5432
      targetPort: 5432
