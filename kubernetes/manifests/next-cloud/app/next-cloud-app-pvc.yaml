# 
# Next Cloud App - Persistent Volume Claim 
# A persistent Volume claim is used for requesting storage from the cluster
# 
# We need a place to store the next cloud data
# It will request 500GB at minimum with read and write access

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bigkev-storage-data-pvc
  namespace: nextcloud-namespace
spec:
  storageClassName: bigkev-storage
  accessModes:
    - ReadWriteOnce
  #minimum amount of storage before putting a node on this storage
  resources:
    requests:
      storage: 500Gi
